<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delivery Structure Overview</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="overview.css">
</head>
<body>

<div class="app">

    <!-- ================= HEADER ================= -->

    <header class="page-header">

        <div class="header-left">
            <h1>Delivery Structure Overview</h1>
            <p class="sub">
                Core Process • <strong>Delivery</strong>
            </p>
        </div>

    </header>

    <!-- ================= CONTENT ================= -->
<div class="classification-banner">
                Classification Tool
            </div>
    <main class="overview-page">

        <!-- ========= LEFT ========= -->

        
        <section class="overview-main">

            

            <div class="plc-section">
                <div class="section-title">
                    Project Life Cycle & Frameworks
                </div>

              <div class="plc-column">

                  <div class="level-tag">LEVEL 1</div>

                  <button class="btn-plc"
                      onclick="window.open('Life_cycle.html','_blank')">

                      <span class="card-icon">📘</span>

                      <span class="card-title">
                          Project Life Cycle
                      </span>

                  </button>

                  <div class="framework-arrow">↓</div>

                  <div class="plc-row-buttons">

                      <button class="btn-framework"
                          onclick="window.open('matrix.html?phase=opportunity&from=index','_blank')">

                          <span class="card-icon">📋</span>

                          Bid Framework

                      </button>

                      <button class="btn-framework2"
                          onclick="window.open('matrix.html?phase=initialisation&from=index','_blank')">

                          <span class="card-icon">📊</span>

                          Real Framework

                      </button>

                  </div>

              </div>

              <!-- LEVEL 2 -->

              <div class="plc-column">

                  <div class="level-tag">LEVEL 2</div>

                  <button class="btn-plc"
                      onclick="window.open('Life_cycle.html','_blank')">

                      <span class="card-icon">📘</span>

                      <span class="card-title">
                          Project Life Cycle
                      </span>

                  </button>

                  <div class="framework-arrow">↓</div>

                  <div class="plc-row-buttons">

                      <button class="btn-framework"
                          onclick="window.open('matrix.html?phase=opportunity&from=index','_blank')">

                          <span class="card-icon">📋</span>

                          Bid Framework

                      </button>

                      <button class="btn-framework2"
                          onclick="window.open('matrix.html?phase=initialisation&from=index','_blank')">

                          <span class="card-icon">📊</span>

                          Real Framework

                      </button>

                  </div>

              </div>

              <!-- LEVEL 3 -->

              <div class="plc-column">

                  <div class="level-tag">LEVEL 3</div>

                  <button class="btn-plc"
                      onclick="window.open('Life_cycle.html','_blank')">

                      <span class="card-icon">📘</span>

                      <span class="card-title">
                          Project Life Cycle
                      </span>

                  </button>

                  <div class="framework-arrow">↓</div>

                  <div class="plc-row-buttons">

                      <button class="btn-framework"
                          onclick="window.open('matrix.html?phase=opportunity&from=index','_blank')">

                          <span class="card-icon">📋</span>

                          Bid Framework

                      </button>

                      <button class="btn-framework2"
                          onclick="window.open('matrix.html?phase=initialisation&from=index','_blank')">

                          <span class="card-icon">📊</span>

                          Real Framework

                      </button>

                  </div>

              </div>
            </div>

            <!-- ================= GOVERNANCE ================= -->

            <div class="meetings-card">

                <div class="section-title">
                    Governance Meetings
                </div>

                <div class="meetings-levels"
                     id="meetingLevels">
                </div>

            </div>

        </section>

        <!-- ========= RIGHT ========= -->

        <aside class="overview-side">

            <div class="procedures-card">

                <div class="section-title">
                    Delivery Procedures
                </div>

                <div class="procedures-grid"
                     id="procedureButtons">
                </div>

                <div class="procedures-grid"
                     id="procedureButtons2">
                </div>

            </div>

        </aside>

    </main>

</div>

<script src="data.js"></script>
<script src="home.js"></script>

</body>
</html>
